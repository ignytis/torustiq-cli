# Example pipeline demonstrating Lua module in all stage types (source, processor, sink)
name: Lua demonstration pipeline with source, processor, and sink stages

stages:
  # Source stage: generates numbers 1-5
  - name: Lua Source
    handler: lua
    config:
      content: |
        function run()
          for i = 1, 5 do
            headers = {}
            headers["source"] = "lua_header_" .. tostring(i)
            sendMessage(tostring(i), headers)
          end
        end

  # Processor stage: multiplies each number by 10
  - name: Lua Processor
    handler: lua
    config:
      path: examples/scripts/stage_processor_multiplier.lua

  # Sink stage: prints formatted output
  - name: Lua Sink
    handler: lua
    config:
      content: |
        function write(data, headers)
          print("Received message: ")
          print("  Payload: " .. data)
          print("  Lua header:" .. headers["source"])
        end
